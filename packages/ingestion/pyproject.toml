[project]
name = "ingestion"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "shared",
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.0",
    "pdfplumber>=0.10.0",
    "huggingface-hub>=1.20.1",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
shared = { workspace = true }
