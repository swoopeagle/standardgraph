
[project]
name = "crosswalk-engine"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["shared", "numpy>=1.26"]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
shared = { workspace = true }
