[project]
name = "standardgraph"
version = "1.6.1"
description = "Map any curriculum standard to its equivalent in another country or exam board — 175,000+ standards across 310 systems in 50+ countries, cross-walked into one graph (incl. direct within-family country-to-country edges) and served as a Claude MCP server"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "StandardGraph" }]
keywords = ["mcp", "education", "curriculum", "standards", "ccss", "ngss", "math", "science", "ela", "claude"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Education",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Education",
]
dependencies = [
    "fastmcp>=0.3.0",
    "httpx>=0.27.0",
    "numpy>=1.26.0",
]

[project.urls]
Homepage = "https://github.com/swoopeagle/standardgraph"
Repository = "https://github.com/swoopeagle/standardgraph"
"Bug Tracker" = "https://github.com/swoopeagle/standardgraph/issues"

[project.scripts]
standardgraph = "common_core.server:main"
standardgraph-serve = "common_core.server:serve_http"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
# workspace dep only used in local dev; not needed for PyPI distribution
